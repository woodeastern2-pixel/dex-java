name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'ai_voc_assistant/**'
      - '.github/workflows/build-windows-exe.yml'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ai_voc_assistant

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Archive Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-voc-assistant-windows-release
          path: ai_voc_assistant/build/windows/x64/runner/Release/**
